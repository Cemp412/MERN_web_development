<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET & POST Requests</title>
</head>
<body>
    <h3>Get Request Form</h3>
    <form method="get" action="http://localhost:8000/register">
        <input type="text" class="form-control" placeholder="enter username" name="username" />
    
        <input type="password" class="form-control" placeholder="enter password" name="password" />
    
        <input type="submit" name="submit" /> 
    </form>

    <hr>

    <h3>Post Request Form</h3>
    <form method="post" action="http://localhost:8000/register">  
        <input type="text" class="form-control" placeholder="enter username" name="username" />
    
        <input type="password" class="form-control" placeholder="enter password" name="password" />
    
        <input type="submit" name="submit" /> 

    </form>

    <!-- <script src="../Backend/js/app.js"></script> -->
      <script src="../Backend/js/classes.js"></script>
</body>
</html>
